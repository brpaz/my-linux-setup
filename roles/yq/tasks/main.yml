---
- name: YQ | Get latest release
  community.general.github_release:
    action: latest_release
    repo: yq
    token: "{{ github_token }}"
    user: mikefarah
  register: yq_release
- name: YQ | Download and Install
  ansible.builtin.get_url:
    dest: "{{ bin_dir }}/yq"
    mode: a+x
    url: https://github.com/mikefarah/yq/releases/download/{{ yq_release.tag }}/yq_linux_amd64
  become: true
