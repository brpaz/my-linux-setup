---
- name: Download installer
  ansible.builtin.get_url:
    url: https://claude.ai/install.sh
    dest: /tmp/claude-install.sh
    mode: "0755"

- name: Install
  ansible.builtin.command:
    argv:
      - bash
      - /tmp/claude-install.sh
  args:
    creates: /usr/local/bin/claude
  changed_when: true
