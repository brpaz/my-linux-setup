- name: Get latest release
  community.general.github_release:
    action: latest_release
    user: peteonrails
    repo: voxtype
    token: "{{ github_token }}"
  register: voxtype_latest_release

- name: Install
  ansible.builtin.dnf:
    state: present
    disable_gpg_check: true
    name: https://github.com/peteonrails/voxtype/releases/download/v0.7.5/voxtype-0.7.5-1.x86_64.rpm
  become: true
