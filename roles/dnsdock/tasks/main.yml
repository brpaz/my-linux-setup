---
- name: Get Docker Bridge ip address
  ansible.builtin.shell: |
    set -o pipefail
    ip -4 addr show docker0 | grep -oP '(?<=inet\s)\d+(\.\d+){3}'
  register: dnsdock_docker0_ip
  changed_when: false
  check_mode: false
  args:
    executable: /bin/bash

- name: Print docker0 ip address
  ansible.builtin.debug:
    var: dnsdock_docker0_ip.stdout

- name: Get Docker client API version
  ansible.builtin.command: |
    docker version --format '\{\{ .Server.APIVersion \}\}'
  register: dnsdock_docker_api_version
  changed_when: false

- name: Start container
  community.docker.docker_container:
    name: dnsdock
    image: "aacebedo/dnsdock:{{ dnsdock_version }}"
    command: "--domain={{ dnsdock_domain }}"
    ports:
      - "{{ dnsdock_docker0_ip.stdout }}:53:53/udp"
    restart_policy: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    env:
      # This is required, otherwise the container will not start, if there are some differences
      DOCKER_API_VERSION: "{{ dnsdock_docker_api_version.stdout }}"
