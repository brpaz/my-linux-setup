---
- name: Get latest release version
  community.general.github_release:
    action: latest_release
    repo: hostctl
    token: "{{ github_token }}"
    user: guumaster
  register: hostctl_release

- name: Hostctl | Download
  ansible.builtin.unarchive:
    dest: "{{ bin_dir }}"
    mode: a+x
    remote_src: true
    src: https://github.com/guumaster/hostctl/releases/download/{{ hostctl_release.tag }}/hostctl_{{ hostctl_release.tag[1:] }}_linux_64-bit.tar.gz
  become: true
