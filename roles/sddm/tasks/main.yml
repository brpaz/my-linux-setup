- name: SDDM | Install packages
  community.general.pacman:
    name:
      - sddm
      - gnome-keyring
    state: present
  become: true

- name: SDDM | Ensure pam.d directory exists
  ansible.builtin.file:
    path: /etc/pam.d
    state: directory
    mode: '0755'
  become: true

- name: SDDM | Configure PAM login stack
  ansible.builtin.copy:
    dest: /etc/pam.d/sddm
    mode: '0644'
    content: |
      auth        include       login
      auth        optional      pam_gnome_keyring.so

      account     include       login

      password    include       login

      session     include       login
      session     optional      pam_gnome_keyring.so auto_start
  become: true

- name: SDDM | Configure PAM autologin stack
  ansible.builtin.copy:
    dest: /etc/pam.d/sddm-autologin
    mode: '0644'
    content: |
      auth        required      pam_shells.so
      auth        sufficient    pam_permit.so
      auth        optional      pam_gnome_keyring.so

      account     include       login

      password    include       login

      session     include       login
      session     optional      pam_gnome_keyring.so auto_start
  become: true

- name: SDDM | Enable service
  ansible.builtin.systemd:
    name: sddm
    enabled: true
    state: started
  become: true
