---
- name: Get latest release
  community.general.github_release:
    action: latest_release
    user: stern
    repo: stern
    token: "{{ github_token }}"
  register: stern_release

- name: Download
  ansible.builtin.unarchive:
    dest: "{{ setup_dir }}"
    remote_src: true
    src: https://github.com/stern/stern/releases/download/{{ stern_release.tag }}/stern_{{ stern_release.tag[1:] }}_linux_amd64.tar.gz
  become: true

- name: Install
  ansible.builtin.copy:
    dest: "{{ bin_dir }}"
    mode: a+x
    src: "{{ setup_dir }}/stern"
  become: true
