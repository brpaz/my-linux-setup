---
- name: Get latest release
  community.general.github_release:
    action: latest_release
    user: vladimirvivien
    repo: ktop
    token: "{{ github_token }}"
  register: ktop_release

- name: Download and extract archive
  ansible.builtin.unarchive:
    src: https://github.com/vladimirvivien/ktop/releases/download/{{ ktop_release.tag }}/ktop_{{ ktop_release.tag }}_linux_amd64.tar.gz
    dest: "{{ setup_dir }}"
    remote_src: true
  become: true

- name: Install
  ansible.builtin.copy:
    src: "{{ setup_dir }}/ktop"
    dest: "{{ bin_dir }}/ktop"
    mode: a+x
  become: true
