---
- name: Mkcert | Get latest release
  community.general.github_release:
    action: latest_release
    repo: mkcert
    token: "{{ github_token }}"
    user: FiloSottile
  register: mkcert_release

- name: Mkcert | Install Binary
  ansible.builtin.get_url:
    dest: "{{ bin_dir }}/mkcert"
    mode: a+x
    url: https://github.com/FiloSottile/mkcert/releases/download/{{ mkcert_release.tag }}/mkcert-{{ mkcert_release.tag }}-linux-amd64
  become: true
- name: Mkcert | Install certificates
  ansible.builtin.command: mkcert -install
  changed_when: true
