- name: Add copr repository
  ansible.builtin.command:
    cmd: dnf copr enable -y lionheartp/Hyprland
  creates: /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:lionheartp:Hyprland.repo

- name: Install Hyprland packages
  ansible.builtin.dnf:
    name:
      - hyprland
      - hyprlock
      - hypridle
      - hyprpaper
    state: present
  become: true
