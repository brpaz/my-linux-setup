---
- name: Check if nix is installed
  ansible.builtin.command: which nix
  register: nix_installed
  failed_when: nix_installed.rc != 0
  ignore_errors: true
  changed_when: false

- name: Download nix installer
  ansible.builtin.get_url:
    url: https://install.determinate.systems/nix
    dest: "{{ setup_dir }}/nix-installer.sh"
    mode: "0755"
  when: nix_installed.rc != 0

- name: Install nix
  ansible.builtin.command:
    argv:
      - sh
      - "{{ setup_dir }}/nix-installer.sh"
      - install
      - --no-confirm
  become: true
  changed_when: true
  when: nix_installed.rc != 0

- name: Ensure nixpkgs config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/nixpkgs"
    state: directory
    mode: "0755"

- name: Configure NUR
  ansible.builtin.template:
    src: nixpkgs.config.nix.j2
    dest: "{{ ansible_env.HOME }}/.config/nixpkgs/config.nix"
    mode: "0644"

- name: Alejandra | Get latest release
  community.general.github_release:
    action: latest_release
    user: kamadorueda
    repo: alejandra
    token: "{{ github_token }}"
  register: nix_alejandra_release

- name: Alejandra | Install
  ansible.builtin.get_url:
    url: "https://github.com/kamadorueda/alejandra/releases/download/{{ nix_alejandra_release.tag }}/alejandra-x86_64-unknown-linux-musl"
    dest: "{{ bin_dir }}/alejandra"
    mode: a+x
  become: true
