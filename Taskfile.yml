version: "3"

tasks:
  default:
    cmds:
      - task -l

  dev:
    desc: Setup development environment
    cmds:
      - python3 -m venv .venv && source .venv/bin/activate
      - pip install -r requirements.txt
      - task galaxy

  galaxy:
    desc: Install Ansible Galaxy roles
    cmds:
      - ansible-galaxy install -p .ansible_galaxy/roles -r requirements.yml
      - ansible-galaxy collection install -p .ansible_galaxy/collections -r requirements.yml

  lint:
    desc: Runs Ansible Lint agains manifests
    cmds:
      - ansible-lint playbooks roles inventories

  check:
    desc: Check syntax of a playbook against an inventory
    cmds:
      - ansible-playbook --syntax-check -i ${INVENTORY:?set INVENTORY} --limit ${LIMIT:-all} playbooks/${PLAYBOOK:-setup.yml}

  playbook-tuxedo:
    desc: Run tuxedo playbook
    cmds:
      - ansible-playbook -i {{ .INVENTORY }} --ask-become-pass ${PLAYBOOK:-playbooks/tuxedo.yml} --tags ${TAG:-all}
    vars:
      INVENTORY: "inventories/personal/hosts.ini"

  playbook-zenbook:
    desc: Run zenbook playbook
    cmds:
      - ansible-playbook -i {{ .INVENTORY }} --ask-become-pass ${PLAYBOOK:-playbooks/zenbook.yml} --tags ${TAG:-all}
    vars:
      INVENTORY: "inventories/personal/hosts.ini"
