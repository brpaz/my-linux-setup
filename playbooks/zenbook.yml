    - { role: nextcloud, tags: [nextcloud, internet, productivity]}
    # Graphics
    - { role: pinta, tags: [pinta, graphics] }
    - { role: gradia, tags: [gradia, utilities ]}
    - { role: loupe, tags: [loupe, graphics ]}

    # Utilities
    - { role: obfuscate, tags: [obfuscate, utilities, screenshot] }
    - { role: keeppassxc, tags: [keepassxc, utilities, security ]}
    - { role: bitwarden, tags: [bitwarden, utilities, security ]}
    # Fonts
    - { role: fonts, tags: [fonts] }

    # AI
    - { role: opencode, tags: [opencode, ai, github] }

    # Docker Applications
    - { role: traefik, tags: [traefik, docker]}
    - { role: dozzle, tags: [dozzle, docker ]}
    - { role: dnsdock, tags: [dnsdock, docker]}
